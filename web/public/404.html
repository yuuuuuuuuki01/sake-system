<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>syusen-cloud</title>
    <script>
      // GitHub Pages SPA redirect
      // サブルートへの直アクセス時にindex.htmlへリダイレクトし、
      // sessionStorageにパスを保存してSPAルーターに渡す
      (function () {
        var base = "/sake-system";
        // フルパス（baseを含む）を保存しておく
        sessionStorage.setItem(
          "spa-redirect",
          location.pathname + location.search + location.hash
        );
        location.replace(base + "/");
      })();
    </script>
  </head>
  <body></body>
</html>
