<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- キャッシュさせない(SPA redirectが古いと困るため) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- JS無効時のフォールバック -->
    <meta http-equiv="refresh" content="0;url=/sake-system/" />
    <title>syusen-cloud — 読み込み中</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic UI", sans-serif;
        background: linear-gradient(180deg, #e8f2f8 0%, #f7fafc 100%);
        display: grid;
        place-items: center;
        color: #1f2933;
      }
      .loading {
        text-align: center;
      }
      .spinner {
        width: 48px;
        height: 48px;
        margin: 0 auto 20px;
        border: 4px solid #d9e2ec;
        border-top-color: #0f5b8d;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { margin: 0 0 8px; font-size: 18px; font-weight: 700; }
      p { margin: 0; font-size: 13px; color: #52606d; }
      .fallback {
        margin-top: 24px;
        font-size: 12px;
      }
      .fallback a { color: #0f5b8d; text-decoration: underline; }
    </style>
    <script>
      // GitHub Pages SPA redirect — サブルート直アクセス時の復元
      // サーバーは404を返すが、このページで即座にルートへ飛ばしてSPAに委譲する
      (function () {
        try {
          var base = "/sake-system";
          // 元のフルパスをセッションに保存 → index.htmlで復元される
          sessionStorage.setItem(
            "spa-redirect",
            location.pathname + location.search + location.hash
          );
          location.replace(base + "/");
        } catch (e) {
          // sessionStorage不可などの例外時はmeta refreshに任せる
        }
      })();
    </script>
  </head>
  <body>
    <div class="loading">
      <div class="spinner" aria-hidden="true"></div>
      <h1>読み込み中…</h1>
      <p>ページに移動しています。数秒お待ちください。</p>
      <p class="fallback">
        自動で移動しない場合は <a href="/sake-system/">こちら</a> をクリック
      </p>
    </div>
  </body>
</html>
