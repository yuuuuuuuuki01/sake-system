<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- 常に最新を取得 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>syusen-cloud</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAceSBzOjpcOjXa5F0sA-326kdZdqz9r-s&language=ja" defer></script>
    <script>
      // Service Worker解除 + キャッシュクリア
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(name) { caches.delete(name); });
        });
      }
      // 404.htmlから渡された元のパスを復元してSPAルーターに引き渡す
      (function redirectSpaPath() {
        try {
          var redirect = sessionStorage.getItem("spa-redirect");
          if (redirect && redirect !== location.pathname + location.search + location.hash) {
            sessionStorage.removeItem("spa-redirect");
            history.replaceState(null, "", redirect);
          } else if (redirect) {
            sessionStorage.removeItem("spa-redirect");
          }
        } catch (e) {
          // sessionStorage未対応時は無視
        }
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-WhdtBQa4.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-rHoMm4Xb.css">
  </head>

    <div id="app"></div>
  </body>
</html>
